        <section class="insight-section" aria-labelledby="risk-heading">
            <h2 id="risk-heading">風險信號</h2>
            <div class="risk-list" id="riskSignals" aria-live="polite">
                <!-- Dynamic -->
            </div>
        </section>

        <!-- Module 5: Most Significant Changes (Phase 10) -->
        <section class="insight-section" aria-labelledby="changes-heading">
            <h2 id="changes-heading">近期重大變更（30 天）</h2>
            <div class="change-feed" id="significantChanges" aria-live="polite">
                <!-- Phase 10: cross-entity change feed -->
            </div>

        <!-- Module 6: Priority Review Queue (Phase 10) -->
        <section class="insight-section" aria-labelledby="priority-heading">
            <h2 id="priority-heading">優先複查佇列</h2>
            <div class="priority-queue" id="priorityQueue" aria-live="polite">
                <!-- Phase 10: ranked priority items -->
            </div>
