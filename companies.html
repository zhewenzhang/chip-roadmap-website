<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公司深度分析 | Company Analysis</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;0,900;1,400;1,600;1,700&family=Source+Serif+4:wght@400;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <span class="logo-icon">◆</span>
                <span class="logo-text">晶片產業分析</span>
            </div>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">首頁</a></li>
                <li><a href="roadmap.html">Roadmap</a></li>
                <li><a href="companies.html" class="active">公司分析</a></li>
                <li><a href="insights.html">行業洞察</a></li>
            </ul>
            <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="選單">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <!-- 页面标题 -->
    <header class="companies-header">
        <h1>公司<em>深度分析</em></h1>
        <p style="color: var(--text-secondary); margin-top: 16px;">深度分析 250+ 家公司，涵蓋 AI 加速器、CPU、GPU、MCU 等多個領域</p>

        <div class="roadmap-filters" style="margin-top: 32px;">
            <button class="filter-btn active" data-filter="all">全部</button>
            <button class="filter-btn" data-filter="china">中国公司</button>
            <button class="filter-btn" data-filter="overseas">海外公司</button>
        </div>
    </header>

    <!-- 公司网格 -->
    <div class="companies-grid" id="companiesGrid">
        <!-- 动态加载 -->
    </div>

    <!-- 底部说明 -->
    <section class="data-disclaimer">
        <div class="disclaimer-box">
            <h3>數據說明</h3>
            <p>公司數據來源於公開資料，包括公司官網、財報、招股書和行業報道。部分初創公司信息可能不夠完整，我們將持續更新和補充。</p>
        </div>
    </section>

    <script src="js/app.js"></script>
</body>
</html>
