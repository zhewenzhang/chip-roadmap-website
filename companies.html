<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公司分析 — 芯片情報</title>
    <meta name="description" content="Signal-driven company intelligence directory for the semiconductor industry. Track signals, ABF impact, and chip roadmaps across global companies.">
    <meta property="og:title" content="公司分析 — 芯片情報">
    <meta property="og:description" content="Signal-driven company intelligence directory. Track live signals, ABF impact, and chip roadmaps across global semiconductor companies.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://zhewenzhang.github.io/chip-roadmap-website/companies.html">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="公司分析 — 芯片情報">
    <meta name="twitter:description" content="Signal-driven company intelligence directory for the semiconductor industry.">
    <link rel="canonical" href="https://zhewenzhang.github.io/chip-roadmap-website/companies.html">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self'; img-src 'self' data: https:; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com wss://*.firebaseio.com;">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar" aria-label="Main navigation">
        <div class="nav-container">
            <div class="logo">
                <span class="logo-icon" aria-hidden="true">&#9670;</span>
                <span class="logo-text">芯片情報</span>
            </div>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">首頁</a></li>
                <li><a href="roadmap.html">路線圖</a></li>
                <li><a href="companies.html" class="active" aria-current="page">公司分析</a></li>
                <li><a href="insights.html">行業洞察</a></li>
                <li><a href="signals.html">信號工作台</a></li>
            </ul>
            <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="選單" aria-expanded="false" aria-controls="navLinks">
                <span aria-hidden="true"></span>
                <span aria-hidden="true"></span>
                <span aria-hidden="true"></span>
            </button>
        </div>
    </nav>

    <!-- 页面标题 -->
    <header class="companies-header">
        <h1>公司情報目錄</h1>
        <div class="companies-search-wrap">
            <input
                type="search"
                id="companySearchInput"
                class="companies-search-input"
                placeholder="搜索公司名稱或芯片型號…"
                autocomplete="off"
                aria-label="搜索公司"
            />
        </div>
        <div class="companies-filter-bar" role="group" aria-label="公司篩選">
            <button class="filter-btn active" data-filter="all" aria-pressed="true">全部</button>
            <button class="filter-btn" data-filter="china" aria-pressed="false">中國</button>
            <button class="filter-btn" data-filter="usa" aria-pressed="false">美國</button>
            <button class="filter-btn" data-filter="taiwan" aria-pressed="false">台灣</button>
            <button class="filter-btn" data-filter="japan" aria-pressed="false">日本</button>
            <button class="filter-btn" data-filter="korea" aria-pressed="false">韓國</button>
            <button class="filter-btn" data-filter="foundry" aria-pressed="false">晶圓代工</button>
            <button class="filter-btn" data-filter="memory" aria-pressed="false">記憶體</button>
            <button class="filter-btn" data-filter="substrate" aria-pressed="false">ABF 基板</button>
            <button class="filter-btn" data-filter="osat" aria-pressed="false">封裝 OSAT</button>
        </div>
    </header>

    <!-- 公司网格 -->
    <main>
        <div class="companies-grid" id="companiesGrid" aria-live="polite">
            <!-- 动态加载 -->
        </div>

        <button id="loadMoreCompaniesBtn" class="load-more-btn" style="display:none;" aria-label="加载更多公司卡片">加载更多</button>

        <!-- 底部说明 -->
        <section class="data-disclaimer">
            <div class="disclaimer-box">
                <h3>數據說明</h3>
                <p>公司數據來源於公開資料，包括公司官網、財報、招股書和行業報道。部分初創公司信息可能不夠完整，我們將持續更新和補充。</p>
            </div>
        </section>
    </main>

    <script type="module" src="js/modules/global-nav.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
