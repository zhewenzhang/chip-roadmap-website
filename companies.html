<body>
    <!-- 导航栏 -->
    <nav class="navbar" aria-label="Main navigation">
        <div class="nav-container">
            <div class="logo">
                <span class="logo-icon" aria-hidden="true">&#9670;</span>
                <span class="logo-text">晶片產業分析</span>
            </div>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">首頁</a></li>
                <li><a href="roadmap.html">Roadmap</a></li>

                <li><a href="insights.html">行業洞察</a></li>
                <li><a href="signals.html">Signals</a></li>
            </ul>
            <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="選單" aria-expanded="false" aria-controls="navLinks">
                <span aria-hidden="true"></span>
                <span aria-hidden="true"></span>
                <span aria-hidden="true"></span>
            </button>
        </div>

    <!-- 页面标题 -->
    <header class="companies-header">
        <h1>晶片<em>情報目錄</em></h1>
        <p style="color: var(--text-secondary); margin-top: 16px;">全球半導體公司情報索引 — 由 signals 系統驅動的即時數據</p>

        <div class="roadmap-filters" style="margin-top: 32px;" role="group" aria-label="公司篩選">
            <button class="filter-btn active" data-filter="all" aria-pressed="true">全部</button>
            <button class="filter-btn" data-filter="china" aria-pressed="false">中国公司</button>
            <button class="filter-btn" data-filter="overseas" aria-pressed="false">海外公司</button>
        </div>
    </header>

    <!-- 公司网格 -->
    <main>
        <div class="companies-grid" id="companiesGrid" aria-live="polite">
            <!-- 动态加载 -->
        </div>

        <button id="loadMoreCompaniesBtn" class="load-more-btn" style="display:none;" aria-label="加载更多公司卡片">加载更多</button>

        <!-- 底部说明 -->
        <section class="data-disclaimer">
            <div class="disclaimer-box">
                <h3>數據說明</h3>
                <p>公司數據來源於公開資料，包括公司官網、財報、招股書和行業報道。部分初創公司信息可能不夠完整，我們將持續更新和補充。</p>
