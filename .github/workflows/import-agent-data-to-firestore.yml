name: Import Agent Data to Firestore

on:
  workflow_dispatch:
  schedule:
    # Taipei time: 02:30 and 14:30 every day.
    - cron: '30 6,18 * * *'

permissions:
  contents: read

concurrency:
  group: firestore-agent-import
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Fetch agent data branch
        run: git fetch origin agent-data:refs/remotes/origin/agent-data

      - name: Import reviewed agent data to Firestore
        run: node scripts/agent-data-importer.js
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
