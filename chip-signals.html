<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>芯片詳情（重定向） — 芯片情報</title>
    <script>
        (function() {
            var params = new URLSearchParams(window.location.search);
            var name = params.get('name') || params.get('chip');
            if (name) {
                window.location.replace('chip.html?name=' + encodeURIComponent(name));
            } else {
                window.location.replace('companies.html');
            }
        })();
    </script>
</head>

</body>
