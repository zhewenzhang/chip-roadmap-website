<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Chip Roadmap</title>
    <link rel="stylesheet" href="admin.css">
</head>
<body>

<!-- Login -->
<div id="login-section">
    <div class="login-card">
        <h1>Chip Roadmap Admin</h1>
        <form id="login-form">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required autocomplete="current-password">
            </div>
            <p id="login-error" class="error-text" aria-live="polite"></p>
            <button type="submit" class="btn-primary" id="login-btn">Login</button>
        </form>
    </div>
</div>

<!-- Dashboard -->
<div id="app-section" style="display:none">
    <header class="admin-header">
        <span class="admin-logo">Chip Roadmap Admin</span>
        <nav class="tab-nav">
            <button class="tab-btn active" data-tab="dashboard">今日待辦</button>
            <button class="tab-btn" data-tab="inbox">新信號</button>
            <button class="tab-btn" data-tab="review">待驗證</button>
            <button class="tab-btn" data-tab="data-quality">資料修補</button>
            <button class="tab-btn" data-tab="signals">全部信號</button>
            <button class="tab-btn" data-tab="add-data">資料輸入</button>
            <button class="tab-btn" data-tab="companies">公司目錄</button>
            <button class="tab-btn" data-tab="insights">Insights</button>
            <button class="tab-btn" data-tab="articles">Articles</button>
        </nav>
        <div class="header-right">
            <span id="user-email" class="user-email"></span>
            <button id="logout-btn" class="btn-outline">Logout</button>
        </div>
    </header>

    <main class="admin-main">
        <!-- Dashboard Tab (今日待辦) — default landing -->
        <section id="tab-dashboard" class="tab-content active">
            <div id="dashboard-content">Loading...</div>
        </section>

        <!-- Inbox Tab (新信號) -->
        <section id="tab-inbox" class="tab-content">
            <div id="inbox-content">Loading...</div>
        </section>

        <!-- Review Tab (待驗證) -->
        <section id="tab-review" class="tab-content">
            <div id="review-content">Loading...</div>
        </section>

        <!-- Data Quality Tab (資料修補) -->
        <section id="tab-data-quality" class="tab-content">
            <div id="data-quality-content">Loading...</div>
        </section>

        <!-- Signals Tab (全部信號) -->
        <section id="tab-signals" class="tab-content">
            <div id="signals-content">Loading...</div>
        </section>

        <!-- Add Data Tab (資料輸入) -->
        <section id="tab-add-data" class="tab-content">
            <div id="add-data-content">Loading...</div>
        </section>

        <!-- Companies Tab (公司目錄) -->
        <section id="tab-companies" class="tab-content">
            <div id="companies-content">Loading...</div>
        </section>

        <!-- Insights Tab -->
        <section id="tab-insights" class="tab-content">
            <div id="insights-content">Loading...</div>
        </section>

        <!-- Articles Tab -->
        <section id="tab-articles" class="tab-content">
            <div id="articles-content">Loading...</div>
        </section>

        <!-- Legacy sections (kept for existing render functions, hidden by default) -->
        <section id="tab-import" class="tab-content" style="display:none">
            <div id="import-content"></div>
        </section>
        <section id="tab-ai-extract" class="tab-content" style="display:none">
            <div id="ai-extract-content"></div>
        </section>
        <section id="tab-completeness" class="tab-content" style="display:none">
            <div id="completeness-content"></div>
        </section>
    </main>
</div>

<!-- Modal -->
<div id="modal" class="modal-overlay" style="display:none" role="dialog" aria-modal="true">
    <div class="modal-box">
        <div class="modal-header">
            <h2 id="modal-title"></h2>
            <button id="modal-close" class="modal-close" aria-label="Close">✕</button>
        </div>
        <div id="modal-body" class="modal-body"></div>
        <div class="modal-footer">
            <button id="modal-cancel" class="btn-outline">Cancel</button>
            <button id="modal-save" class="btn-primary">Save</button>
        </div>
    </div>
</div>

<div id="toast" class="toast" style="display:none"></div>

<script type="module" src="admin.js"></script>
</body>
</html>
