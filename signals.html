<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>信號 — 晶片產業 Roadmap</title>
    <meta name="description" content="覆蓋中國、台灣與全球供應鏈的 AI 芯片與先進封裝驗證信號">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;0,900;1,400;1,600;1,700&family=Source+Serif+4:wght@400;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar" aria-label="Main navigation">
        <div class="nav-container">
            <div class="logo">
                <span class="logo-icon" aria-hidden="true">&#9670;</span>
                <span class="logo-text">芯片產業分析</span>
            </div>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">Home</a></li>
                <li><a href="roadmap.html">Roadmap</a></li>
                <li><a href="companies.html">Companies</a></li>
                <li><a href="insights.html">Insights</a></li>
                <li><a href="signals.html" class="active" aria-current="page">信號</a></li>
            </ul>
            <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Open menu" aria-expanded="false">
                <span aria-hidden="true"></span>
                <span aria-hidden="true"></span>
                <span aria-hidden="true"></span>
            </button>
        </div>
    </nav>

    <!-- Signals Page Content -->
    <main class="signals-page" id="signalsPage">
        <!-- Page Header -->
        <header class="signals-header">
            <h1>信號</h1>
            <p class="signals-subhead">覆蓋中國、台灣與全球供應鏈的 AI 芯片與先進封裝驗證信號。</p>
        </header>

        <!-- Summary Strip -->
        <div class="signals-summary-layer" id="signalsSummaryLayer">
            <!-- Compact intelligence blocks rendered by JS -->
        </div>

        <!-- View Toggles & Saved Views -->
        <div class="signals-view-controls">
            <div class="view-toggles" id="viewToggles">
                <button class="view-toggle active" data-view="all">全部</button>
                <button class="view-toggle" data-view="new">最新</button>
                <button class="view-toggle" data-view="changed">變更</button>
                <button class="view-toggle" data-view="high-impact">高 ABF 影響</button>
                <button class="view-toggle" data-view="verified">已驗證</button>
                <button class="view-toggle" data-view="china">中國觀察</button>
                <button class="view-toggle" data-view="global">全球封裝</button>
            </div>
            <div class="saved-views-wrap">
                <span class="saved-views-label">儲存的視圖：</span>
                <div class="saved-views-list" id="savedViewsList">
                    <!-- Saved views tokens -->
                </div>
            </div>
        </div>

        <!-- Filter Toolbar -->
        <div class="signals-toolbar" id="signalsToolbar">
            <input type="text" id="filterSearch" placeholder="搜尋公司、芯片名稱..." class="filter-input">
            <select id="filterRegion" class="filter-select"><option value="">地區</option></select>
            <select id="filterCompany" class="filter-select"><option value="">公司</option></select>
            <select id="filterStage" class="filter-select"><option value="">階段</option></select>
            <select id="filterImpact" class="filter-select"><option value="">ABF 影響</option></select>
            <select id="filterStatus" class="filter-select"><option value="">狀態</option></select>
            <button id="filterReset" class="filter-reset">重置</button>
            <button id="saveViewBtn" class="filter-save">儲存當前篩選</button>
        </div>

        <!-- Signals Table -->
        <div class="signals-table-wrap" id="signalsTableWrap">
            <!-- Loading skeleton rendered by JS -->
        </div>

        <!-- Compare Strip (Sticky Bottom) -->
        <div class="compare-strip" id="compareStrip" style="display:none">
            <div class="compare-count"><span id="compareCount">0</span> 個信號已選擇</div>
            <div class="compare-items" id="compareItems"></div>
            <div class="compare-actions">
                <button id="compareBtn" class="compare-run-btn">進入對比</button>
                <button id="compareClear" class="compare-clear-btn">清除</button>
            </div>
        </div>

        <!-- Detail Drawer (Desktop) / Modal (Mobile) -->
        <div class="drawer-overlay" id="drawerOverlay" style="display:none">
            <aside class="signal-drawer" id="signalDrawer">
                <div class="drawer-header">
                    <h2 id="drawerTitle"></h2>
                    <button class="drawer-close" id="drawerClose" aria-label="Close">&#215;</button>
                </div>
                <div class="drawer-body" id="drawerBody">
                    <!-- Sections rendered by JS -->
                </div>
            </aside>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <div class="footer-section">
                <h4>數據來源</h4>
                <ul>
                    <li>供應鏈驗證</li>
                    <li>跨境情報</li>
                    <li>產業分析師</li>
                </ul>
            </div>
            <div class="footer-section">
                <h4>更新頻率</h4>
                <ul>
                    <li>每日：信號更新</li>
                    <li>每週：驗證通過</li>
                    <li>每月：深度檢討</li>
                </ul>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 晶片產業分析平台 | 半導體情報</p>
        </div>
    </footer>

    <script type="module" src="js/app.js"></script>
</body>
</html>
