<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>信號工作台 — 芯片情報</title>
    <meta name="description" content="覆蓋中國、台灣與全球供應鏈的 AI 芯片與先進封裝驗證信號">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar" aria-label="Main navigation">
        <div class="nav-container">
            <div class="logo">
                <span class="logo-icon" aria-hidden="true">&#9670;</span>
                <span class="logo-text">芯片情報</span>
            </div>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">首頁</a></li>
                <li><a href="roadmap.html">路線圖</a></li>
                <li><a href="companies.html">公司分析</a></li>
                <li><a href="insights.html">行業洞察</a></li>
                <li><a href="signals.html" class="active" aria-current="page">信號工作台</a></li>
            </ul>
            <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Open menu" aria-expanded="false">
                <span aria-hidden="true"></span>
                <span aria-hidden="true"></span>
                <span aria-hidden="true"></span>
            </button>
        </div>
    </nav>

    <!-- Signals Page Content -->
    <main class="signals-page" id="signalsPage">
        <!-- Page Header -->
        <header class="signals-header">
            <h1>信號</h1>
            <p class="signals-subhead">覆蓋中國、台灣與全球供應鏈的 AI 芯片與先進封裝驗證信號。</p>
        </header>

        <!-- Summary Strip -->
        <div class="signals-summary-layer" id="signalsSummaryLayer">
            <!-- Compact intelligence blocks rendered by JS -->
        </div>

        <!-- Change Intelligence Workspace (Phase 10) -->
        <div class="change-intelligence" id="changeIntelligence" style="display:none">
            <div class="change-header-row">
                <h2 class="change-title">變更情報</h2>
                <div class="change-tabs">
                    <button class="change-tab active" data-change-view="priority">待關注</button>
                    <button class="change-tab" data-change-view="upgrades">近期升級</button>
                    <button class="change-tab" data-change-view="conflicts">新衝突</button>
                    <button class="change-tab" data-change-view="watchlist">關注中</button>
                </div>
            </div>
            <div class="change-content" id="changeContent">
                <!-- Rendered by JS -->
            </div>
        </div>

        <!-- View Toggles & Saved Views -->
        <div class="signals-view-controls">
            <div class="view-toggles" id="viewToggles">
                <button class="view-toggle active" data-view="all">全部</button>
                <button class="view-toggle" data-view="watched">關注中</button>
                <button class="view-toggle" data-view="new">最新</button>
                <button class="view-toggle" data-view="changed">變更</button>
                <button class="view-toggle" data-view="high-impact">高 ABF 影響</button>
                <button class="view-toggle" data-view="verified">已驗證</button>
                <button class="view-toggle" data-view="china">中國觀察</button>
                <button class="view-toggle" data-view="global">全球封裝</button>
            </div>
            <div class="saved-views-wrap">
                <span class="saved-views-label">儲存的視圖：</span>
                <div class="saved-views-list" id="savedViewsList">
                    <!-- Saved views tokens -->
                </div>
            </div>
        </div>

        <!-- Watchlist Panel (Phase 3) -->
        <div class="watchlist-panel" id="watchlistPanel" style="display:none">
            <div class="watchlist-header">
                <h2 class="watchlist-title">我的關注列表</h2>
                <button class="watchlist-clear" id="clearWatchlistBtn">清除全部</button>
            </div>
            <div class="watchlist-groups">
                <div class="watchlist-group">
                    <div class="watchlist-group-label">公司</div>
                    <div class="watchlist-items" id="watchedCompanies"></div>
                </div>
                <div class="watchlist-group">
                    <div class="watchlist-group-label">芯片</div>
                    <div class="watchlist-items" id="watchedChips"></div>
                </div>
            </div>
        </div>

        <!-- Watchlist Focus Strip (Phase 4) -->
        <div id="watchlistFocusStrip" class="watchlist-strip" style="display:none">
            <div class="watchlist-strip-stats">
                <span class="watchlist-strip-count" id="wlStripCompanies">0 公司</span>
                <span class="watchlist-strip-count" id="wlStripChips">0 芯片</span>
                <span class="watchlist-strip-count" id="wlStripSignals">0 信號</span>
            </div>
            <div class="watchlist-strip-actions">
                <button class="wl-quick-btn wl-quick-btn-primary" data-quick="wl-all" title="只看關注項目">只看關注</button>
                <button class="wl-quick-btn" data-quick="wl-changed" title="關注中狀態變更">關注中變更</button>
                <button class="wl-quick-btn" data-quick="wl-high" title="關注中高影響">關注中高影響</button>
                <button class="wl-quick-btn" data-quick="wl-watch" title="關注中待驗證">關注中待驗證</button>
                <button class="wl-quick-btn" data-quick="all" title="顯示全部信號">全部信號</button>
            </div>
        </div>

        <!-- Filter Toolbar -->
        <div class="signals-toolbar" id="signalsToolbar">
            <input type="text" id="filterSearch" placeholder="搜尋公司、芯片名稱..." class="filter-input">
            <select id="filterRegion" class="filter-select"><option value="">地區</option></select>
            <select id="filterCompany" class="filter-select"><option value="">公司</option></select>
            <select id="filterStage" class="filter-select"><option value="">階段</option></select>
            <select id="filterImpact" class="filter-select"><option value="">ABF 影響</option></select>
            <select id="filterStatus" class="filter-select"><option value="">狀態</option></select>
            <button id="filterReset" class="filter-reset">重置</button>
            <button id="saveViewBtn" class="filter-save">儲存當前篩選</button>
        </div>

        <!-- Signals Table -->
        <div class="signals-table-wrap" id="signalsTableWrap">
            <!-- Loading skeleton rendered by JS -->
        </div>

        <!-- Compare Strip (Sticky Bottom) -->
        <div class="compare-strip" id="compareStrip" style="display:none">
            <div class="compare-count"><span id="compareCount">0</span> 個信號已選擇</div>
            <div class="compare-items" id="compareItems"></div>
            <div class="compare-actions">
                <button id="compareBtn" class="compare-run-btn">進入對比</button>
                <button id="compareClear" class="compare-clear-btn">清除</button>
            </div>
        </div>

        <!-- Detail Drawer (Desktop) / Modal (Mobile) -->
        <div class="drawer-overlay" id="drawerOverlay" style="display:none">
            <aside class="signal-drawer" id="signalDrawer">
                <div class="drawer-header">
                    <h2 id="drawerTitle"></h2>
                    <button class="drawer-close" id="drawerClose" aria-label="Close">&#215;</button>
                </div>
                <div class="drawer-body" id="drawerBody">
                    <!-- Sections rendered by JS -->
                </div>
            </aside>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <div class="footer-section">
                <h4>[DATA]</h4>
                <ul>
                    <li>供應鏈驗證</li>
                    <li>跨境情報</li>
                    <li>產業分析師</li>
                </ul>
            </div>
            <div class="footer-section">
                <h4>[FREQ]</h4>
                <ul>
                    <li>每日：信號更新</li>
                    <li>每週：驗證通過</li>
                    <li>每月：深度檢討</li>
                </ul>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 晶片產業分析平台 | 半導體情報 | <span id="footerStatus">SYS READY</span></p>
        </div>
    </footer>

    <script type="module" src="js/app.js"></script>
</body>
</html>
