<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公司詳情（重定向） — 芯片情報</title>
    <script>
        (function() {
            var params = new URLSearchParams(window.location.search);
            var id = params.get('id') || params.get('company');
            if (id) {
                window.location.replace('company.html?id=' + encodeURIComponent(id));
            } else {
                window.location.replace('companies.html');
            }
        })();
    </script>
</head>
<body>
    <p>正在跳轉...</p>
</body>
</html>
